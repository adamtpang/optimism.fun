<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; padding: 28px 32px; background: var(--surface-canvas); }
  .grid { display: flex; flex-direction: column; gap: 20px; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .lab { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text-faint); width: 70px; flex-shrink: 0; }
</style>

<body class="lattice-bg">
  <div id="root" class="grid"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel">
    const { TierPill, ConfidenceBadge } = window.OptimismFunDesignSystem_a3f244
    const Row = ({ label, children }) => (
      <div className="row"><span className="lab">{label}</span>{children}</div>
    )
    ReactDOM.createRoot(document.getElementById('root')).render(
      <>
        <Row label="tiers">
          <TierPill tier="welfare" /><TierPill tier="x-risk" /><TierPill tier="hard-tech" />
          <TierPill tier="progress" /><TierPill tier="emerging" />
        </Row>
        <Row label="confidence">
          <ConfidenceBadge confidence="high" source="World Bank" asOf="2024" />
          <ConfidenceBadge confidence="med" source="estimate" />
          <ConfidenceBadge confidence="low" />
        </Row>
        <Row label="in use">
          <span style={{fontFamily:'var(--font-mono)',fontSize:'13px',color:'var(--signal-green)',fontVariantNumeric:'tabular-nums'}}>487×</span>
          <ConfidenceBadge confidence="high" source="Copenhagen Consensus" />
          <span style={{width:'12px'}} />
          <TierPill tier="x-risk" />
          <span style={{fontFamily:'var(--font-mono)',fontSize:'13px',color:'var(--text-secondary)'}}>aligned ai</span>
        </Row>
      </>
    )
  </script>
</body>
</html>
